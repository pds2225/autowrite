      detail: "품목 입력(자연어)→HS코드 매칭→제재국 필터링→추천"
    - name: "바이어 필터링"
      detail: "MOQ, 인증 조건 기반 적합성 높은 바이어만 선별"
    - name: "수익성 시뮬레이션"
      detail: "Landed Cost 기반 BEP 분석"
    - name: "자동계약서 생성"
      detail: "사용자 입력값으로 수출계약서 RPA 생성"
  tech_stack: "Python, Node.js, Docker, KOTRA API"
  development_status: "MVP 개발완료"
  differentiators:
    - "국가선정~계약까지 One-Stop (경쟁사는 일부 기능만)"
    - "Hard Gate 필터링으로 수출 불가 국가 제거"

